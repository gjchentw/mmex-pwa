name: release

on:
  workflow_run:
    workflows:
      - test
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  preflight:
    if: ${{ github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ github.event.workflow_run.head_sha }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
      is_validated: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "Validation gate evaluated based on test workflow conclusion."

  build-pages:
    needs: preflight
    if: ${{ needs.preflight.outputs.is_validated == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build project
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build
        with:
          path: dist

  deploy-pages:
    needs: [preflight, build-pages]
    if: ${{ needs.preflight.outputs.is_validated == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  tag-and-release:
    needs: [preflight, deploy-pages]
    if: ${{ needs.preflight.outputs.is_validated == 'true' && needs.deploy-pages.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" --generate-notes
          else
            echo "Tag $TAG already exists, skipping release creation."
          fi
