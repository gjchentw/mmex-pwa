name: version-guard

on:
  pull_request:
    branches:
      - master

jobs:
  enforce-version-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate package.json version policy
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin "$BASE_REF"

          BASE_VERSION=$(git show "origin/$BASE_REF:package.json" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version));")
          HEAD_VERSION=$(node -p "require('./package.json').version")
          export BASE_VERSION
          export HEAD_VERSION

          echo "Base version: $BASE_VERSION"
          echo "Head version: $HEAD_VERSION"

          node - <<'NODE'
          const baseVersion = process.env.BASE_VERSION;
          const headVersion = process.env.HEAD_VERSION;
          const labels = JSON.parse(process.env.PR_LABELS_JSON || '[]');

          const parse = (v) => {
            const m = /^([0-9]+)\.([0-9]+)\.([0-9]+)$/.exec(v);
            if (!m) return null;
            return { major: Number(m[1]), minor: Number(m[2]), patch: Number(m[3]) };
          };

          const b = parse(baseVersion);
          const h = parse(headVersion);

          if (!b || !h) {
            console.error('Version must be strict semver X.Y.Z in package.json');
            process.exit(1);
          }

          if (h.major !== 0) {
            console.error(`MAJOR must remain 0 before MMEX community acceptance. Found: ${headVersion}`);
            process.exit(1);
          }

          if (b.major !== 0) {
            console.error(`Base branch major version is not 0: ${baseVersion}`);
            process.exit(1);
          }

          const greaterThan =
            h.major > b.major ||
            (h.major === b.major && h.minor > b.minor) ||
            (h.major === b.major && h.minor === b.minor && h.patch > b.patch);

          if (!greaterThan) {
            console.error(`Version must be incremented. Base=${baseVersion}, Head=${headVersion}`);
            process.exit(1);
          }

          const minorApprovalLabel = 'version:minor-approved';
          const hasMinorApproval = labels.includes(minorApprovalLabel);

          if (h.minor === b.minor) {
            if (h.patch !== b.patch + 1) {
              console.error(
                `PATCH must increase by exactly +1 for standard spec evolution. Base=${baseVersion}, Head=${headVersion}`,
              );
              process.exit(1);
            }
            console.log('Patch bump policy check passed.');
            process.exit(0);
          }

          if (h.minor === b.minor + 1 && h.patch === 0) {
            if (!hasMinorApproval) {
              console.error(
                `Minor bump requires maintainer approval label '${minorApprovalLabel}'. Labels=${labels.join(', ') || '(none)'}`,
              );
              process.exit(1);
            }
            console.log('Minor bump policy check passed with maintainer approval label.');
            process.exit(0);
          }

          console.error(
            `Invalid version transition: ${baseVersion} -> ${headVersion}. Allowed: patch +1, or minor +1 with patch reset to 0 and approval label '${minorApprovalLabel}'.`,
          );
          process.exit(1);
          NODE
        shell: bash
