name: test

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'

permissions:
  contents: read
  checks: write

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/

  report:
    runs-on: ubuntu-latest
    needs: [lint, build, unit-tests, e2e-tests]
    if: always()
    outputs:
      is_validated: ${{ steps.final_status.outputs.is_validated }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect failed stage
        id: failed_stage
        run: |
          ./.github/scripts/ci/detect-failed-stage.sh \n            lint=${{ needs.lint.result }} \n            build=${{ needs.build.result }} \n            unit-tests=${{ needs.unit-tests.result }} \n            e2e-tests=${{ needs.e2e-tests.result }}
      - name: Evaluate deployment signal
        id: final_status
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "is_validated=true" >> "$GITHUB_OUTPUT"
            echo "Core tests passed. System is deployable."
          else
            echo "is_validated=false" >> "$GITHUB_OUTPUT"
            echo "Blocking tests (Build/E2E) failed. Deployment blocked."
          fi
      - name: Write summary
        run: |
          ./.github/scripts/ci/write-run-summary.sh \n            "Validation Pipeline Result" \n            "- Status: ${{ steps.failed_stage.outputs.failed_stage == 'none' && 'success' || 'failure' }}" \n            "- Deployable: ${{ steps.final_status.outputs.is_validated }}" \n            "- Failed stage: ${{ steps.failed_stage.outputs.failed_stage }}"
      - name: Fail workflow if blocking checks failed
        if: steps.final_status.outputs.is_validated == 'false'
        run: exit 1
