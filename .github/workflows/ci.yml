name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# A newer push to the same ref makes the in-flight run obsolete. Never cancel on
# main: once the deploy job is enabled, that run may be mid-deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: lint / type-check / unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          # The build imports the schema from mmex/database. Without submodules
          # it fails at import time.
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      # .npmrc sets engine-strict and Node came from .nvmrc, so this step doubles
      # as the check that .nvmrc still satisfies package.json engines: if they
      # drift apart, npm fails here with EBADENGINE.
      - name: Install dependencies
        run: npm ci

      # The governed stack table in the openspec spec must match package.json;
      # it drifted twice within a day of being written, so this is automated.
      - name: Check governed stack drift
        run: node scripts/check-stack-drift.mjs

      # Deliberately NOT `npm run lint`: that script passes --fix, which would
      # repair violations and then report success. A gate must not mutate its input.
      - name: Lint
        run: npm run lint:check

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # The sole Google credential (openspec: cloud-file-sync design.md D8).
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # `_headers` carries cross-origin isolation to Cloudflare. It is a plain
      # text file with no schema validation, so a rename or typo fails open --
      # silently disabling SharedArrayBuffer in production. Assert it survives.
      - name: Assert _headers reached the build output
        run: |
          test -f dist/_headers || { echo 'dist/_headers missing -- production would lose cross-origin isolation'; exit 1; }
          grep -q 'Cross-Origin-Opener-Policy' dist/_headers || { echo 'COOP missing from dist/_headers'; exit 1; }
          grep -q 'Cross-Origin-Embedder-Policy' dist/_headers || { echo 'COEP missing from dist/_headers'; exit 1; }
          echo '_headers present with COOP + COEP.'

      # The PWA manifest must carry the product identity, not vite-plugin-pwa
      # defaults -- a silent regression here makes the app uninstallable or
      # mislabeled. (`.webmanifest` cannot be require()d; parse it as JSON.)
      - name: Assert PWA manifest is not the plugin default
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('./dist/manifest.webmanifest', 'utf8'))
            const bad = []
            if (m.theme_color === '#42b883') bad.push('theme_color is the vite-plugin-pwa default')
            if (m.name === 'mmex-pwa') bad.push('name is the package-name default')
            if (!m.icons || m.icons.length === 0) bad.push('no icons declared -- app is not installable')
            if (!m.icons.some(i => i.purpose === 'maskable')) bad.push('no maskable icon declared')
            if (bad.length) { console.error('Manifest retains defaults:\n  - ' + bad.join('\n  - ')); process.exit(1) }
            console.log('Manifest is customized:', m.name, m.theme_color, m.icons.length + ' icons')
          "

      # deploy downloads this rather than rebuilding, so the bundle that ships is
      # byte-for-byte the one the gate verified.
      - name: Upload verified bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: deploy to Cloudflare Pages
    # The gate is structural: this job is unreachable unless every gate job
    # passes. A red pipeline cannot publish -- that is the whole reason CI owns
    # the deploy rather than Cloudflare's git integration building on its own.
    # e2e is NOT part of the gate: removed by operator decision 2026-07-18
    # (openspec: infrastructure-baseline design.md D12). The suite remains
    # runnable locally via `npm run test:e2e`.
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # Publish the exact artifact the gate verified, rather than rebuilding.
      - name: Download verified bundle
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The Pages project must already exist. `pages deploy` can create one,
          # but it prompts for the production branch, and prompting in CI is an
          # error -- so a missing project fails here rather than self-healing.
          command: pages deploy dist --project-name=mmex-pwa --branch=main

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.deployment-url }}"
