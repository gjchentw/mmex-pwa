name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# A newer push to the same ref makes the in-flight run obsolete. Never cancel on
# main: once the deploy job is enabled, that run may be mid-deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: lint / type-check / unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          # The build imports the schema from mmex/database. Without submodules
          # it fails at import time.
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      # .npmrc sets engine-strict and Node came from .nvmrc, so this step doubles
      # as the check that .nvmrc still satisfies package.json engines: if they
      # drift apart, npm fails here with EBADENGINE.
      - name: Install dependencies
        run: npm ci

      # Deliberately NOT `npm run lint`: that script passes --fix, which would
      # repair violations and then report success. A gate must not mutate its input.
      - name: Lint
        run: npm run lint:check

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          VITE_GOOGLE_APP_ID: ${{ secrets.VITE_GOOGLE_APP_ID }}

      # `_headers` carries cross-origin isolation to Cloudflare. It is a plain
      # text file with no schema validation, so a rename or typo fails open --
      # silently disabling SharedArrayBuffer in production. Assert it survives.
      - name: Assert _headers reached the build output
        run: |
          test -f dist/_headers || { echo 'dist/_headers missing -- production would lose cross-origin isolation'; exit 1; }
          grep -q 'Cross-Origin-Opener-Policy' dist/_headers || { echo 'COOP missing from dist/_headers'; exit 1; }
          grep -q 'Cross-Origin-Embedder-Policy' dist/_headers || { echo 'COEP missing from dist/_headers'; exit 1; }
          echo '_headers present with COOP + COEP.'

      # deploy downloads this rather than rebuilding, so the bundle that ships is
      # byte-for-byte the one the gate verified.
      - name: Upload verified bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: deploy to Cloudflare Pages
    # The gate is structural: this job is unreachable unless every gate job
    # passes. A red pipeline cannot publish -- that is the whole reason CI owns
    # the deploy rather than Cloudflare's git integration building on its own.
    needs: [quality, build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # Publish the exact artifact the gate verified, rather than rebuilding.
      - name: Download verified bundle
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The Pages project must already exist. `pages deploy` can create one,
          # but it prompts for the production branch, and prompting in CI is an
          # error -- so a missing project fails here rather than self-healing.
          command: pages deploy dist --project-name=mmex-pwa --branch=main

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.deployment-url }}"

  # Enabled since P1 (production i18n rendering) was fixed by replacing the
  # lookalike i18n plugin. Runs on Chromium only -- the governed engine set;
  # see openspec: Automated Testing Toolchain. When the suite starts asserting
  # crossOriginIsolated / OPFS database opening (openspec task 5.3), re-add
  # WebKit FIRST: iOS mandates WebKit for every browser.
  #
  # Remaining known production defects (design.md Open Question 0) -- neither
  # blocks this suite's current assertions:
  #   P2  built worker requests unhashed sqlite3.wasm; SPA fallback answers
  #       with index.html, so the database cannot open in a production build
  #   P3  COEP require-corp blocks the cross-origin Quasar CDN logo
  # Deploy stays enabled ahead of P2 by operator decision: the deployed URL is
  # a pipeline smoke test, not a working product, until P2 lands.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # playwright.config.ts serves `npm run preview` on CI, which carries the
      # same COOP/COEP headers as the dev server, so this exercises a genuinely
      # cross-origin isolated context.
      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
