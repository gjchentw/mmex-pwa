name: test

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'

permissions:
  contents: read
  checks: write

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Collect run context
        id: context
        run: ./.github/scripts/ci/collect-run-context.sh

      - name: Validate workflow syntax
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          filter_mode: nofilter
          reporter: github-check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 12

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 12

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 25

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run integration tests (e2e)
        run: npm run test:e2e

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 30

  report:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - unit-tests
      - e2e-tests
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect failed stage
        id: failed_stage
        run: |
          ./.github/scripts/ci/detect-failed-stage.sh \n            lint=${{ needs.lint.result }} \n            build=${{ needs.build.result }} \n            unit-tests=${{ needs.unit-tests.result }} \n            e2e-tests=${{ needs.e2e-tests.result }}

      - name: Write success summary
        if: ${{ steps.failed_stage.outputs.failed_stage == 'none' }}
        run: |
          ./.github/scripts/ci/write-run-summary.sh \n            "Validation Pipeline Result" \n            "- Status: success" \n            "- Branch: ${{ github.ref_name }}" \n            "- Commit: ${{ github.sha }}" \n            "- Quality gates: lint -> build -> unit-tests -> e2e-tests"

      - name: Write failure summary
        if: ${{ steps.failed_stage.outputs.failed_stage != 'none' }}
        run: |
          ./.github/scripts/ci/write-run-summary.sh \n            "Validation Pipeline Result" \n            "- Status: failure" \n            "- Branch: ${{ github.ref_name }}" \n            "- Commit: ${{ github.sha }}" \n            "- Failed stage: ${{ steps.failed_stage.outputs.failed_stage }}" \n            "- Stage status: ${{ steps.failed_stage.outputs.failed_status }}"

      - name: Fail report job when any gate failed
        if: ${{ steps.failed_stage.outputs.failed_stage != 'none' }}
        run: |
          echo "One or more quality gates failed"
          exit 1
